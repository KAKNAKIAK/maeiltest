<script>
const monthMap = { 'JAN': '1', 'FEB': '2', 'MAR': '3', 'APR': '4', 'MAY': '5', 'JUN': '6', 'JUL': '7', 'AUG': '8', 'SEP': '9', 'OCT': '10', 'NOV': '11', 'DEC': '12' };
    let priceSectionCounter = 0;
    let flightScheduleGroupCounter = 0;

function enableSelectOnFocus(containerSelector = 'body') {
    const container = document.querySelector(containerSelector);
    if (!container) return;
    container.addEventListener('focusin', function(event) {
        const target = event.target;
        if (target.matches('input[type="text"], input[type="email"], input[type="number"], textarea')) {
            if (target.select) {
                setTimeout(() => { target.select(); }, 0);
            }
        }
    });
}

    function createPriceSection(sectionIndex) {
        const sectionId = `priceSection_${sectionIndex}`; const tableBodyId = `priceTableBody_${sectionIndex}`; const grandTotalId = `grandTotal_${sectionIndex}`; const defaultAdultCount = 1; const defaultChildCount = 0; const defaultInfantCount = 0; const groupTitleInputName = `price_group_title_${sectionIndex}`;
        const sectionDiv = document.createElement('div'); sectionDiv.className = 'dynamic-section price-section'; sectionDiv.id = sectionId;
        sectionDiv.dataset.sectionIndex = sectionIndex; // Store original section index

        sectionDiv.innerHTML = `
            <button type="button" class="delete-dynamic-section delete-dynamic-section-btn text-red-500 hover:text-red-700" title="이 요금 그룹 삭제"><i class="fas fa-trash-alt mr-1"></i>삭제</button>
            <div class="mb-2">
                <input type="text" name="${groupTitleInputName}" class="w-full px-3 py-2 border rounded focus:outline-none focus:border-custom-orange text-lg font-semibold" placeholder="견적설명 (미리보기 '요금 안내' 그룹 제목)">
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full bg-white border price-table">
                    <thead><tr class="bg-gray-100"><th class="border p-2 text-center" style="width: 20%;">내역</th><th class="border p-2 text-center" style="width: 15%;">1인당 금액</th><th class="border p-2 text-center" style="width: 8%;">인원</th><th class="border p-2 text-center" style="width: 17%;">총 금액</th><th class="border p-2 text-center">비고</th><th class="border p-2 text-center w-12">삭제</th></tr></thead>
                    <tbody id="${tableBodyId}" class="price-table-body">
                        <tr class="person-type-row" data-person-type="adult"><td class="border p-2"><input type="text" name="p_title_${sectionIndex}[]" value="성인요금" class="w-full border-0 focus:ring-0"></td><td class="border p-2"><input type="number" name="p_perprice_${sectionIndex}[]" class="price-per-person w-full border-0 focus:ring-0" value=""></td><td class="border p-2"><input type="number" name="p_number_${sectionIndex}[]" class="person-count w-full border-0 focus:ring-0" value="${defaultAdultCount}"></td><td class="border p-2"><input type="text" name="p_totalprice_${sectionIndex}[]" class="w-full border-0 focus:ring-0 total-price" value="" readonly></td><td class="border p-2"><input type="text" name="p_bigo_${sectionIndex}[]" class="w-full border-0 focus:ring-0" value=""></td><td class="border p-2 text-center"><button type="button" class="delete-row text-red-500 hover:text-red-700" title="삭제"><i class="fas fa-trash"></i></button></td></tr>
                        <tr class="person-type-row" data-person-type="child"><td class="border p-2"><input type="text" name="p_title_${sectionIndex}[]" value="소아요금" class="w-full border-0 focus:ring-0"></td><td class="border p-2"><input type="number" name="p_perprice_${sectionIndex}[]" class="price-per-person w-full border-0 focus:ring-0" value=""></td><td class="border p-2"><input type="number" name="p_number_${sectionIndex}[]" class="person-count w-full border-0 focus:ring-0" value="${defaultChildCount}"></td><td class="border p-2"><input type="text" name="p_totalprice_${sectionIndex}[]" class="w-full border-0 focus:ring-0 total-price" value="0" readonly></td><td class="border p-2"><input type="text" name="p_bigo_${sectionIndex}[]" class="w-full border-0 focus:ring-0" value="만2~12세미만 (좌석점유)\n"></td><td class="border p-2 text-center"><button type="button" class="delete-row text-red-500 hover:text-red-700" title="삭제"><i class="fas fa-trash"></i></button></td></tr>
                        <tr class="person-type-row" data-person-type="infant"><td class="border p-2"><input type="text" name="p_title_${sectionIndex}[]" value="유아요금" class="w-full border-0 focus:ring-0"></td><td class="border p-2"><input type="number" name="p_perprice_${sectionIndex}[]" class="price-per-person w-full border-0 focus:ring-0" value="\n"></td><td class="border p-2"><input type="number" name="p_number_${sectionIndex}[]" class="person-count w-full border-0 focus:ring-0" value="${defaultInfantCount}"></td><td class="border p-2"><input type="text" name="p_totalprice_${sectionIndex}[]" class="w-full border-0 focus:ring-0 total-price" value="0" readonly></td><td class="border p-2"><input type="text" name="p_bigo_${sectionIndex}[]" class="w-full border-0 focus:ring-0" value="만24개월 미만(좌석미점유)\n"></td><td class="border p-2 text-center"><button type="button" class="delete-row text-red-500 hover:text-red-700" title="삭제"><i class="fas fa-trash"></i></button></td></tr>
                    </tbody>
                    <tfoot><tr><td colspan="3" class="border p-2 text-right font-bold">총 합계</td><td class="border p-2 font-bold"><input type="text" name="p_sumprice_${sectionIndex}" id="${grandTotalId}" class="w-full border-0 focus:ring-0 grand-total-input" value="0" readonly></td><td colspan="2" class="border p-2"><button type="button" class="add-price-row-to-section bg-custom-green text-white px-3 py-1 rounded hover:bg-opacity-90 transition text-sm"><i class="fas fa-plus mr-1"></i> 행 추가</button></td></tr></tfoot>
                </table>
            </div>`;
        document.getElementById('priceSectionsContainer').appendChild(sectionDiv); initPriceTableForSection(sectionDiv);
    }
    function initPriceTableForSection(sectionElement) {
        sectionElement.querySelectorAll('.price-per-person, .person-count').forEach(input => { input.addEventListener('input', (e) => updateRowTotalForSection(e, sectionElement)); });
        sectionElement.querySelectorAll('.price-table-body tr').forEach(row => { const firstInput = row.querySelector('.price-per-person'); if (firstInput) updateRowTotalForSection({ target: firstInput }, sectionElement); });
    }
    function updateRowTotalForSection(event, sectionElement) {
        const row = event.target.closest('tr');
        if (!row) return; const pricePerPersonInput = row.querySelector('.price-per-person'); const personCountInput = row.querySelector('.person-count'); const totalPriceInput = row.querySelector('.total-price');
        if (!pricePerPersonInput || !personCountInput || !totalPriceInput) return;
        const pricePerPerson = parseFloat(pricePerPersonInput.value) || 0; const personCount = parseInt(personCountInput.value) || 0;
        totalPriceInput.value = (pricePerPerson * personCount).toLocaleString(); updateGrandTotalForSection(sectionElement);
    }
    function updateGrandTotalForSection(sectionElement) {
        let grandTotal = 0;
        sectionElement.querySelectorAll('.price-table-body .total-price').forEach(cell => { grandTotal += parseFloat(cell.value.replace(/,/g, '')) || 0; });
        const grandTotalInput = sectionElement.querySelector('.grand-total-input'); if (grandTotalInput) grandTotalInput.value = grandTotal.toLocaleString();
    }
    function addPriceRowToExistingSection(event) {
        const sectionElement = event.target.closest('.price-section');
        const tbody = sectionElement.querySelector('.price-table-body');
        const sectionIndex = sectionElement.dataset.sectionIndex; 
        if (!tbody || sectionIndex === undefined) {
             console.error("Could not find sectionIndex for price row addition"); return;
        }

        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="border p-2"><input type="text" name="p_title_${sectionIndex}[]" value="추가 비용" class="w-full border-0 focus:ring-0"></td><td class="border p-2"><input type="number" name="p_perprice_${sectionIndex}[]" class="price-per-person w-full border-0 focus:ring-0" value="0"></td><td class="border p-2"><input type="number" name="p_number_${sectionIndex}[]" class="person-count w-full border-0 focus:ring-0" value="1"></td><td class="border p-2"><input type="text" name="p_totalprice_${sectionIndex}[]" class="w-full border-0 focus:ring-0 total-price" value="0" readonly></td><td class="border p-2"><input type="text" name="p_bigo_${sectionIndex}[]" class="w-full border-0 focus:ring-0" value=""></td><td class="border p-2 text-center"><button type="button" class="delete-row text-red-500 hover:text-red-700" title="삭제"><i class="fas fa-trash"></i></button></td>`;
        tbody.appendChild(tr); tr.querySelectorAll('.price-per-person, .person-count').forEach(input => input.addEventListener('input', (e) => updateRowTotalForSection(e, sectionElement)));
        const firstInput = tr.querySelector('.price-per-person'); if (firstInput) updateRowTotalForSection({ target: firstInput }, sectionElement);
    }

    function createFlightScheduleGroup(groupIndex) {
        const groupId = `flightScheduleGroup_${groupIndex}`; const gdsInputId = `gdsInput_${groupIndex}`; const parseButtonId = `parseGdsButton_${groupIndex}`; const tableBodyId = `flightTableBody_${groupIndex}`; const addRowButtonId = `addFlightRow_${groupIndex}`; const groupTitleInputName = `flight_group_title_${groupIndex}`;
        const groupDiv = document.createElement('div'); groupDiv.className = 'dynamic-section flight-schedule-group'; groupDiv.id = groupId;

        const targetInput = event.target; if (!targetInput.matches('.flight-schedule-input')) return; event.preventDefault(); const pasteData = (event.clipboardData || window.clipboardData).getData('text/plain'); const rowsOfData = pasteData.split(/\r\n|\n|\r/);
        let currentRowElement = targetInput.closest('tr'); let currentCellIndexInRow = Array.from(currentRowElement.cells).indexOf(targetInput.closest('td')); const currentTbody = currentRowElement.closest('tbody');
        rowsOfData.forEach((rowText) => { if (!rowText.trim()) return; const cellsOfData = rowText.split('\t');
            if (!currentRowElement) { currentRowElement = addFlightRowForGroup(currentTbody); if (!currentRowElement) return; currentCellIndexInRow = 0; }
            const inputFieldsInCurrentRow = currentRowElement.querySelectorAll('.flight-schedule-input'); let dataCellIdx = 0;
            for (let i = currentCellIndexInRow; i < inputFieldsInCurrentRow.length && dataCellIdx < cellsOfData.length; i++) { inputFieldsInCurrentRow[i].value = cellsOfData[dataCellIdx].trim(); dataCellIdx++; }
            const nextTRElement = currentRowElement.nextElementSibling; if (nextTRElement && nextTRElement.cells.length > 0) { currentRowElement = nextTRElement; } else { currentRowElement = null; } currentCellIndexInRow = 0;
        });

    function parseGdsForGroup(gdsInputText, targetTbodyElement) {
        if (!gdsInputText.trim() || !targetTbodyElement) return; targetTbodyElement.innerHTML = ''; const lines = gdsInputText.split('\n'); let cityCodeMap = {};
        lines.forEach(line => { if (!line.trim()) return; const parts = line.split(/\s+/).filter(p => p); let flightNumber = '', departureDateStr = '', originCity = '', departureTime = '', arrivalDateStr = '', destinationCity = '', arrivalTime = '';
            if (parts.length > 1) { const flightCandidate = parts[1]; const flightRegex = /^([A-Z0-9]{2})(\d{3,4})$/; const flightMatch = flightCandidate.match(flightRegex); if (flightMatch) { flightNumber = `${flightMatch[1]} ${flightMatch[2]}`; } else { const fallbackFlightMatch = line.match(/([A-Z0-9]{2})\s*(\d{3,4})/); if (fallbackFlightMatch && fallbackFlightMatch[2] && fallbackFlightMatch[2].length >= 3) { flightNumber = `${fallbackFlightMatch[1]} ${fallbackFlightMatch[2]}`; } else { flightNumber = flightCandidate; }}}
            const dateRegex = /(\d{1,2})([A-Z]{3})/; const depDateMatch = line.match(dateRegex); if (depDateMatch && monthMap[depDateMatch[2].toUpperCase()]) { departureDateStr = `${monthMap[depDateMatch[2].toUpperCase()]}월 ${depDateMatch[1]}일`;}
            const timeAndMaybeArrDateRegex = /(\d{4})\s+(\d{4})(?:\s+(\d{1,2})([A-Z]{3}))?/; const timeMatch = line.match(timeAndMaybeArrDateRegex);
            if (timeMatch) { departureTime = `${timeMatch[1].slice(0, 2)}:${timeMatch[1].slice(2)}`; arrivalTime   = `${timeMatch[2].slice(0, 2)}:${timeMatch[2].slice(2)}`; if (timeMatch[3] && timeMatch[4] && monthMap[timeMatch[4].toUpperCase()]) { arrivalDateStr = `${monthMap[timeMatch[4].toUpperCase()]}월 ${timeMatch[3]}일`;} else if (departureDateStr) { const depDateObj = parseDateStrToDateObj(departureDateStr); if (depDateObj) { const depHour = parseInt(departureTime.substring(0,2)); const arrHour = parseInt(arrivalTime.substring(0,2)); if (arrHour < depHour || (arrHour === depHour && parseInt(arrivalTime.substring(3,5)) < parseInt(departureTime.substring(3,5)) )) { depDateObj.setDate(depDateObj.getDate() + 1); } arrivalDateStr = `${depDateObj.getMonth() + 1}월 ${depDateObj.getDate()}일`;} else { arrivalDateStr = departureDateStr; }}}
            let citiesFound = false; for (const part of parts) { if (part.length === 6 && /^[A-Z]{6}$/.test(part)) { originCity = cityCodeMap[part.substring(0, 3)] || part.substring(0, 3); destinationCity = cityCodeMap[part.substring(3, 6)] || part.substring(3, 6); citiesFound = true; break; }}
            if (!citiesFound) { const sixLetterCityMatch = line.match(/\b([A-Z]{6})\b/); if (sixLetterCityMatch) { const cityPair = sixLetterCityMatch[0]; originCity = cityCodeMap[cityPair.substring(0, 3)] || cityPair.substring(0, 3); destinationCity = cityCodeMap[cityPair.substring(3, 6)] || cityPair.substring(3, 6); }}
            addFlightRowForGroup(targetTbodyElement, flightNumber, departureDateStr, originCity, departureTime, arrivalDateStr, destinationCity, arrivalTime);
        });
    }

    // 포함/불포함 HTML 생성
    function _generatePreviewInclusionsExclusionsHTML_Template(type) {
        const title = type === 'included' ? '포함사항' : '불포함사항';
        const icon = type === 'included' ? 'icon_06.png' : 'icon_07.png';
        const radioName = type === 'included' ? 'includedItemsInputType' : 'excludedItemsInputType';
        const listId = type === 'included' ? 'includedItemsList' : 'excludedItemsList';
        const itemNameAttr = type === 'included' ? 'add_item' : 'min_item';
        const textareaName = type === 'included' ? 'included_items_textarea' : 'excluded_items_textarea';

        let contentHtml = "";
        const inputType = document.querySelector(`input[name="${radioName}"]:checked`);

        if (inputType && inputType.value === 'list') {
            const items = Array.from(document.querySelectorAll(`#${listId} input[name^="${itemNameAttr}"]`)).map(item => item.value.trim()).filter(v => v);
            if (items.length > 0) {
                items.forEach(itemText => { contentHtml += `<div>● ${itemText}</div>`; });
            } else {
                contentHtml = `<div>입력된 ${title}이 없습니다 (항목별).</div>`;
            }
        } else {
            const textarea = document.querySelector(`textarea[name="${textareaName}"]`);
            const text = textarea ? textarea.value.trim() : '';
            if (text) {
                contentHtml = `<div>${text.replace(/\n/g, '<br>')}</div>`;
            } else {
                contentHtml = `<div>입력된 ${title}이 없습니다 (전체 텍스트).</div>`;
            }
        }

        return `
            <tr>
                <td style="padding-top:20px">
                    <table style="width:100%;">
                        <tbody><tr>
                            <td style="padding-bottom:7px">
                                <p style="font-size:14px;color:#ff7c00" class="section-title"><img src="https://www.naeiltour.co.kr/mail/reservation/images/${icon}"> <span style="vertical-align: middle;"><strong>${title}</strong></span></p>

                                ${contentHtml}

                        </tr>
                    </tbody></table>
                </td>
            </tr>
        `;
    }

    // --- 견적서 미리보기 함수 ---
    function previewQuote() {
        syncContentEditableToTextarea();
        const form = document.form1;
        // 유효성 검사
        if (!form.custname.value.trim()) { alert('받는이를 입력해 주세요.'); form.custname.focus(); return; }
        if (!form.custmail.value.trim()) { alert('받는이 메일 주소를 입력해 주세요.'); form.custmail.focus(); return; }
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(form.custmail.value.trim())) { alert('올바른 형식의 받는이 메일 주소를 입력해 주세요.'); form.custmail.focus(); return; }
        if (!form.subject.value.trim()) { alert('메일 제목을 입력해 주세요.'); form.subject.focus(); return; }
        if (!form.goodnm.value.trim()) { alert('상품명을 입력해 주세요.'); form.goodnm.focus(); return; }
        if (!form.empnm.value.trim()) { alert('담당자명을 입력해 주세요.'); form.empnm.focus(); return; }
        if (!form.empmail.value.trim()) { alert('회신 할 메일주소를 입력해 주세요.'); form.empmail.focus(); return; }
        if (!emailRegex.test(form.empmail.value.trim())) { alert('올바른 형식의 회신 메일 주소를 입력해 주세요.'); form.empmail.focus(); return; }
        if (!form.emptel.value.trim()) { alert('연락처를 입력해 주세요.'); form.emptel.focus(); return; }

        // 메인 콘텐츠 영역 생성
        let mainContentHTML = _generatePreviewBasicInfoHTML_Template(form);
        mainContentHTML += _generatePreviewPriceSectionsHTML_Template();
        mainContentHTML += _generatePreviewTravelerInfoHTML_Template();
        mainContentHTML += _generatePreviewInclusionsExclusionsHTML_Template('included');
        mainContentHTML += _generatePreviewInclusionsExclusionsHTML_Template('excluded');
        mainContentHTML += _generatePreviewFlightSchedulesHTML_Template();
        mainContentHTML += _generatePreviewItineraryHTML_Template();

        // 전체 이메일 템플릿 구조 생성
        let fullPreviewHTML = `
            <table style="width:710px; margin: 0 auto; border-spacing: 0; border-collapse: collapse;">
                <tbody>

    // --- HTML 파일 다운로드 함수 ---
    function downloadGeneratedHTML() {
        syncContentEditableToTextarea();
        const form = document.form1;

        if (!form.custname.value.trim()) { alert('받는이를 입력해 주세요.'); form.custname.focus(); return; }
        if (!form.custmail.value.trim()) { alert('받는이 메일 주소를 입력해 주세요.'); form.custmail.focus(); return; }
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(form.custmail.value.trim())) { alert('올바른 형식의 받는이 메일 주소를 입력해 주세요.'); form.custmail.focus(); return; }
        if (!form.subject.value.trim()) { alert('메일 제목을 입력해 주세요.'); form.subject.focus(); return; }
        if (!form.goodnm.value.trim()) { alert('상품명을 입력해 주세요.'); form.goodnm.focus(); return; }
        if (!form.empnm.value.trim()) { alert('담당자명을 입력해 주세요.'); form.empnm.focus(); return; }
        if (!form.empmail.value.trim()) { alert('회신 할 메일주소를 입력해 주세요.'); form.empmail.focus(); return; }
        if (!emailRegex.test(form.empmail.value.trim())) { alert('올바른 형식의 회신 메일 주소를 입력해 주세요.'); form.empmail.focus(); return; }
        if (!form.emptel.value.trim()) { alert('연락처를 입력해 주세요.'); form.emptel.focus(); return; }

        let mainContentHTML = _generatePreviewBasicInfoHTML_Template(form);
        mainContentHTML += _generatePreviewPriceSectionsHTML_Template();
        mainContentHTML += _generatePreviewTravelerInfoHTML_Template();
        mainContentHTML += _generatePreviewInclusionsExclusionsHTML_Template('included');
        mainContentHTML += _generatePreviewInclusionsExclusionsHTML_Template('excluded');
        mainContentHTML += _generatePreviewFlightSchedulesHTML_Template();
        mainContentHTML += _generatePreviewItineraryHTML_Template();

        let fullPreviewHTML_forDownload = `
            <!DOCTYPE html>
            <html lang="ko">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>견적서 - ${form.goodnm.value || '내일투어'}</title>
                ${getMobileStylesForDownload()}
            </head>
            <body style="margin:0; padding:0; background-color: #ffffff;">
                <table style="width:710px; margin: 0 auto; border-spacing: 0; border-collapse: collapse;">
                    <tbody>
                        ${_getPreviewTemplateHeaderHTML()}
                        <tr>
                            <td style="padding: 0px; width:100%; border:1px solid #d2d2d2; background-color: #ffffff;">
                                <table style="width:100%; border-spacing: 0; border-collapse: collapse;">
                                    <tbody>
                                        <tr>
                                            <td style="padding:20px 15px 40px">
                                                <table style="width:100%; border-spacing: 0; border-collapse: collapse;">
                                                    <tbody>
                                                        ${mainContentHTML}
                                                        ${_getPreviewTemplateFooterHTML()}
                                                    </tbody>
                                                </table>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <map name="naeil_header"></map> <map name="naeil_footer"></map>
            </body>
            </html>
        `;

        const fileName = `견적서_${form.custname.value.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0, 10)}.html`;

        const blob = new Blob([fullPreviewHTML_forDownload], { type: 'text/html;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
    }
